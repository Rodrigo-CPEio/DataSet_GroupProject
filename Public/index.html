<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome Free -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2 class="logo">Dashdark</h2>

<ul class="menu">

<li><i class="fa-solid fa-house"></i> <span>Dashboard</span></li>
<li><i class="fa-solid fa-star"></i> <span>Features</span></li>
<li><i class="fa-solid fa-user"></i> <span>Users</span></li>
<li><i class="fa-solid fa-magnifying-glass-dollar"></i> <span>Pricing</span></li>
<li><i class="fa-solid fa-gear"></i> <span>Settings</span></li>

</ul>


</div>


<!-- MAIN CONTENT -->

<div class="main">

<header class="header">

<h2>Analytics</h2>

</header>


<!-- CARDS -->

<section class="cards">

<div class="card">
<h3>Save Products</h3>
<h1>50.8K</h1>
</div>

<div class="card">
<h3>Stock Products</h3>
<h1>23.6K</h1>
</div>

<div class="card">
<h3>Sale Products</h3>
<h1>756</h1>
</div>

<div class="card">
<h3>Average Revenue</h3>
<h1>2.3K</h1>
</div>

</section>


<!-- CHARTS -->

<section class="charts">

<div class="chart-box">

<h3>Website Visitors</h3>
<canvas id="visitorsChart"></canvas>

</div>


<div class="chart-box">

<h3>Revenue</h3>
<canvas id="revenueChart"></canvas>

</div>

</section>

</div>

<script src="js/script.js"></script>
</body>
</html>
